<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Creative Hub</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>.auth-box{max-width:420px;margin:60px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}</style>
</head>
<body>
  <nav class="nav"><div class="brand">Creative Hub</div></nav>
  <main>
    <div class="auth-box">
      <h2>Login</h2>
      <form id="loginForm">
        <input name="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button class="btn" type="submit">Login</button>
      </form>
      <p>Need an account? <a href="/register.html">Register</a></p>
    </div>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const body = { email: form.get('email'), password: form.get('password') };
      const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } else alert(data.message || 'Login failed');
    });
  </script>
</body>
</html>
