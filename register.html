<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - Creative Hub</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>.auth-box{max-width:420px;margin:60px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}</style>
</head>
<body>
  <nav class="nav"><div class="brand">Creative Hub</div></nav>
  <main>
    <div class="auth-box">
      <h2>Register</h2>
      <form id="regForm">
        <input name="name" placeholder="Full name" required />
        <input name="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <select name="role"><option value="client">Client</option><option value="designer">Designer</option></select>
        <button class="btn" type="submit">Create account</button>
      </form>
      <p>Already have an account? <a href="/login.html">Login</a></p>
    </div>
  </main>
  <script>
    document.getElementById('regForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const f = new FormData(e.target);
      const body = { name: f.get('name'), email: f.get('email'), password: f.get('password'), role: f.get('role') };
      const res = await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data = await res.json();
      if (res.ok) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); window.location.href='/dashboard.html'; }
      else alert(data.message||'Registration failed');
    });
  </script>
</body>
</html>
